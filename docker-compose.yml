version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - MAX_FILE_SIZE=10485760

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev
    environment:
      - VITE_API_URL=http://localhost:8000